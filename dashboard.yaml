apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-utilization-dashboard
  namespace: openshift-config-managed
  labels:
    console.openshift.io/dashboard: "true"
data:
  gpu-dashboard.json: |
    {
      "title": "GPU Observability",
      "refresh": "10s",
      "rows": [
        {
          "panels": [
            {
              "title": "GPU Utilization (%)",
              "type": "graph",
              "span": 6,
              "datasource": "prometheus",
              "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL", "legendFormat": "{{Hostname}}"}],
              "yaxes": [{"format": "percent", "min": 0, "max": 100}, {}]
            },
            {
              "title": "GPU Memory (%)",
              "type": "graph",
              "span": 6,
              "datasource": "prometheus",
              "targets": [{"expr": "DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) * 100", "legendFormat": "{{Hostname}}"}],
              "yaxes": [{"format": "percent", "min": 0, "max": 100}, {}]
            }
          ]
        },
        {
          "panels": [
            {
              "title": "GPU Temperature (°C)",
              "type": "graph",
              "span": 6,
              "datasource": "prometheus",
              "targets": [{"expr": "DCGM_FI_DEV_GPU_TEMP", "legendFormat": "{{Hostname}}"}],
              "yaxes": [{"format": "celsius", "min": 0}, {}]
            },
            {
              "title": "GPU Power (W)",
              "type": "graph",
              "span": 6,
              "datasource": "prometheus",
              "targets": [{"expr": "DCGM_FI_DEV_POWER_USAGE", "legendFormat": "{{Hostname}}"}],
              "yaxes": [{"format": "watt", "min": 0}, {}]
            }
          ]
        }
      ]
    }
